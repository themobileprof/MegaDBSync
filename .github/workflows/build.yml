name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
            ext: .exe
          - goos: linux
            goarch: amd64
            ext: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Download modules
        run: go mod download

      - name: Verify modules
        run: go mod verify

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          go build -trimpath -ldflags="-s -w" \
            -o "dist/mdas${{ matrix.ext }}" \
            ./cmd/mdas

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mdas-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/mdas${{ matrix.ext }}
          if-no-files-found: error
          retention-days: 30
