name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Download modules
        run: go mod download

      - name: Verify modules
        run: go mod verify

      - name: Build binary
        env:
          CGO_ENABLED: "0"
        run: go build -trimpath -ldflags="-s -w" -o dist\mdas.exe .\cmd\mdas

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mdas-windows-amd64
          path: dist\mdas.exe
          if-no-files-found: error
          retention-days: 30
