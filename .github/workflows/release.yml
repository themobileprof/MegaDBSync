name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Download modules
        run: go mod download

      - name: Build binaries
        env:
          CGO_ENABLED: "0"
        run: |
          $version = "${{ github.ref_name }}"
          go build -trimpath -ldflags="-s -w" -o dist\megadbsync.exe .\cmd\megadbsync
          go build -trimpath -ldflags="-s -w -X main.setupVersion=$version" -o dist\megadbsync-setup.exe .\cmd\megadbsync-setup

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/megadbsync.exe
            dist/megadbsync-setup.exe
          generate_release_notes: true
